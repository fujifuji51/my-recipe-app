<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイレシピ</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { font-family: sans-serif; margin: 0; padding: 0 15px; background: #f0f2f5; }
    .controls { position: sticky; top: 0; z-index: 100; background: #f0f2f5; padding: 10px 0; }
    input, select { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc; }
    li { background: white; margin-bottom: 10px; padding: 15px; border-radius: 10px; list-style: none; }
    #status { font-size: 12px; color: #888; text-align: right; }
  </style>
</head>
<body>
  <div class="controls">
    <h1>マイレシピ検索</h1>
    <div id="status"></div>
    <select id="category-filter" onchange="filterRecipes()">
      <option value="すべて">すべて表示</option>
    </select>
    <input type="text" id="search-box" oninput="filterRecipes()" placeholder="キーワード検索...">
  </div>
  <ul id="recipe-list">読み込み中...</ul>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbydM1o00k1uV6geLVA4hJx_QPSaS1MS2PD_ko38IL8enNr74AivF_J4lEBhVVDuMjmW/exec";
    const CACHE_KEY = 'recipe_cache';
    let allRecipes = [];

    window.onload = () => {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
      if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/my-recipe-app/sw.js')
      .then(() => console.log('SW登録成功'))
      .catch(e => console.error('SW登録失敗:', e));
  }

      if (navigator.onLine) {
        // オンライン: GASから最新データ取得
        loadFromGAS();
      } else {
        // オフライン: キャッシュから読み込む
        loadFromCache();
      }
    };

    // JSONPでGASからデータ取得
    function loadFromGAS() {
      const script = document.createElement('script');
      script.src = `${GAS_URL}?callback=onRecipesLoaded&t=${Date.now()}`;
      script.onerror = () => {
        // GAS取得失敗時もキャッシュにフォールバック
        loadFromCache();
      };
      document.body.appendChild(script);
    }

    // GASコールバック
    function onRecipesLoaded(data) {
      // localStorageに保存
      try {
        localStorage.setItem(CACHE_KEY, JSON.stringify(data));
        localStorage.setItem(CACHE_KEY + '_date', new Date().toLocaleString('ja-JP'));
      } catch(e) {
        console.warn('キャッシュ保存失敗:', e);
      }
      initRecipes(data, 'オンライン（最新データ）');
    }

    // キャッシュから読み込む
    function loadFromCache() {
      const cached = localStorage.getItem(CACHE_KEY);
      const date = localStorage.getItem(CACHE_KEY + '_date');
      if (cached) {
        initRecipes(JSON.parse(cached), `オフライン（${date} 時点のキャッシュ）`);
      } else {
        document.getElementById('recipe-list').innerHTML =
          '<li>オフラインのため表示できません。一度オンラインで開いてください。</li>';
      }
    }

    function initRecipes(data, statusText) {
      allRecipes = data;
      document.getElementById('status').textContent = statusText;

      // カテゴリの選択肢を動的生成
      const categories = [...new Set(data.map(r => r['カテゴリ']).filter(Boolean))];
      const select = document.getElementById('category-filter');
      // 既存のオプション（すべて以外）をリセット
      select.innerHTML = '<option value="すべて">すべて表示</option>';
      categories.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat;
        select.appendChild(opt);
      });

      showRecipes(allRecipes);
    }

    function showRecipes(data) {
      const list = document.getElementById('recipe-list');
      if (data.length === 0) {
        list.innerHTML = '<li>該当するレシピがありません</li>';
        return;
      }
      list.innerHTML = data.map(r => `
        <li>
          <small>${r['カテゴリ'] || ''}</small><br>
          <strong>${r['レシピ名'] || ''}</strong><br>
          <p>${r['メモ'] || ''}</p>
          <a href="${r['URL'] || '#'}" target="_blank">レシピを見る</a>
        </li>
      `).join('');
    }

    function filterRecipes() {
      const cat = document.getElementById('category-filter').value;
      const word = document.getElementById('search-box').value.toLowerCase();
      const filtered = allRecipes.filter(r => {
        const matchCat = (cat === "すべて" || (r['カテゴリ'] || '').includes(cat));
        const matchWord = `${r['レシピ名'] || ''}${r['メモ'] || ''}`.toLowerCase().includes(word);
        return matchCat && matchWord;
      });
      showRecipes(filtered);
    }
  </script>
</body>
</html>
